<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajd Rowerowy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Rajd Rowerowy</h1>
    <p>Częstochowa — Jasna Góra</p>
  </header>

  <div class="links">
    <a href="https://maps.app.goo.gl/xdhuS95fciM8mtv66" target="_blank" rel="noopener" class="google-maps">
      <span class="icon">🗺️</span> Otwórz trasę w Google Maps
    </a>
    <a href="https://open.spotify.com/playlist/0aw1kEuMuRSlqLUcucRNhl?pi=KgrvHinNR8q3Q" target="_blank" rel="noopener" class="spotify">
      <span class="icon">🎵</span> Playlista na Spotify
    </a>
    <a href="https://photos.app.goo.gl/BPEs8a2sfkRzL2bz8" target="_blank" rel="noopener" class="photos">
      <span class="icon">📸</span> Zdjęcia — Google Photos
    </a>
  </div>

  <div id="map"></div>

  <button class="location-btn" id="locateBtn" onclick="locateMe()">Pokaż moją lokalizację</button>
  <p class="coords" id="coords"></p>

  <footer>Rajd Rowerowy &copy; 2026</footer>
</div>

<script src="app.js"></script>
<script defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBnJ4dfXBIsq_inGv1FYnGjkSSs-3r-30Y&callback=initMap"></script>
</body>
</html>
