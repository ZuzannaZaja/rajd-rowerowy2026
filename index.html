<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajd Rowerowy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Rajd Rowerowy</h1>
    <p>Częstochowa — Jasna Góra</p>
  </header>

  <div class="links">
    <a href="https://maps.app.goo.gl/xdhuS95fciM8mtv66" target="_blank" rel="noopener" class="google-maps">
      <span class="icon">🗺️</span> Otwórz trasę w Google Maps
    </a>
    <a href="https://open.spotify.com/playlist/0aw1kEuMuRSlqLUcucRNhl?pi=KgrvHinNR8q3Q" target="_blank" rel="noopener" class="spotify">
      <span class="icon">🎵</span> Playlista na Spotify
    </a>
    <a href="https://photos.app.goo.gl/BPEs8a2sfkRzL2bz8" target="_blank" rel="noopener" class="photos">
      <span class="icon">📸</span> Zdjęcia — Google Photos
    </a>
  </div>

  <iframe id="map" src="https://www.google.com/maps/embed/v1/directions?key=AIzaSyBnJ4dfXBIsq_inGv1FYnGjkSSs-3r-30Y&origin=Polna+53,+97-371+Wola+Krzysztoporska&destination=Stara+Kamienica+Apartamenty,+Genera%C5%82a+Jana+Henryka+D%C4%85browskiego+10,+42-202+Cz%C4%99stochowa&waypoints=51.2925377,19.5042431%7C51.1907400,19.3392900%7C51.1225364,19.2898146%7C51.0511100,19.1573900%7C50.9430000,19.1690000%7CJasna+G%C3%B3ra,+ul.+o.+A.+Kordeckiego+2,+42-225+Cz%C4%99stochowa&mode=bicycling" loading="lazy"></iframe>

  <button class="location-btn" id="locateBtn" onclick="getLocation()">Pokaż moją lokalizację</button>
  <p class="coords" id="coords"></p>

  <footer>Rajd Rowerowy &copy; 2026</footer>
</div>

<script>
function getLocation() {
  if (!navigator.geolocation) {
    document.getElementById('coords').textContent = 'Geolokalizacja nie jest wspierana.';
    return;
  }

  var btn = document.getElementById('locateBtn');
  btn.disabled = true;
  btn.textContent = 'Szukam lokalizacji...';

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var url = 'https://www.google.com/maps/dir/' + pos.coords.latitude + ',' + pos.coords.longitude +
        '/Polna+53+Wola+Krzysztoporska/Stara+Kamienica+Apartamenty+Czestochowa';
      document.getElementById('coords').textContent =
        'Twoja lokalizacja: ' + pos.coords.latitude.toFixed(5) + ', ' + pos.coords.longitude.toFixed(5);
      btn.disabled = false;
      btn.textContent = 'Otwórz nawigację';
      btn.onclick = function() { window.open(url, '_blank'); };
    },
    function() {
      document.getElementById('coords').textContent =
        'Nie uda\u0142o si\u0119. Sprawd\u017A ustawienia lokalizacji w telefonie.';
      btn.disabled = false;
      btn.textContent = 'Poka\u017C moj\u0105 lokalizacj\u0119';
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
  );
}
</script>
</body>
</html>
